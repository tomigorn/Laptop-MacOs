# ============================================================================
#  keys.conf — keyboard shortcuts for the yabai window snapper  (skhd config)
# ============================================================================
#
# skhd reads this file through the symlink  ~/.config/skhd/skhdrc → keys.conf.
# After editing, reload with:     skhd --restart-service
#
# ── SYNTAX ──────────────────────────────────────────────────────────────────
#   <modifiers> - <key> : <command>
#
#   modifiers : cmd  alt  ctrl  shift  fn                 (combine with +)
#               *** "alt" IS the Option (⌥) key — skhd has no "option" keyword ***
#               hyper = cmd+alt+ctrl+shift     meh = alt+ctrl+shift
#   keys      : left right up down  return  f c d g u i j k  0-9  ...
#   command   : any shell command (so $HOME works)
#   example   : alt + cmd - left : $HOME/.config/yabai/yabai-snap.sh left
#
# ── THIS SETUP'S ACTIONS (see yabai-snap.sh) ────────────────────────────────
#   left   walk the window left through its zones (crosses displays at the edge)
#   right  walk the window right
#   fill   fill the whole display (NOT macOS native fullscreen)
# ============================================================================


# ════════════════════════════════════════════════════════════════════════════
#  ACTIVE SHORTCUTS
# ════════════════════════════════════════════════════════════════════════════

# Option + Command  ⌥⌘ ←/→/↑
# NOTE: in skhd the Option key's keyword is "alt" (there is no "option"
#       keyword), so ⌥⌘ is written  "alt + cmd".
alt + cmd - left   : $HOME/.config/yabai/yabai-snap.sh left
alt + cmd - right  : $HOME/.config/yabai/yabai-snap.sh right
alt + cmd - up     : $HOME/.config/yabai/yabai-snap.sh fill

# Prefer ⌥⌘F for fill instead of ⌥⌘↑? Comment the "alt + cmd - up" line above
# and uncomment this one:
# alt + cmd - f    : $HOME/.config/yabai/yabai-snap.sh fill


# ════════════════════════════════════════════════════════════════════════════
#  REFERENCE — how other tools/OSes map these. Copy a key combo onto a line
#  above, or uncomment here. (Key combo first; what it does in that tool after.)
# ════════════════════════════════════════════════════════════════════════════
#
# Spectacle (macOS, classic) — the ⌥⌘ set above:
#   alt + cmd - left / right / up / down    left / right / top / bottom half
#   alt + cmd - f                           maximize ("fullscreen")
#   alt + cmd - c                           center
#   ctrl + alt + cmd - right                move to next display
#
# Rectangle (macOS) — the ⌃⌥ set above:
#   ctrl + alt - left / right / up / down   halves
#   ctrl + alt - return                     maximize
#   ctrl + alt - d / f / g                  left / center / right third
#   ctrl + alt - u / i / j / k              quarters (top-L / top-R / bot-L / bot-R)
#   ctrl + alt - backspace                  restore / undo
#   ctrl + alt + cmd - right                move to next display
#
# Magnet (macOS) — like Rectangle: ⌃⌥ halves, ⌃⌥↩ maximize, ⌃⌥ d/f/g thirds.
#
# macOS Sequoia built-in tiling (default):
#   fn + ctrl - left / right                left / right half
#   fn + ctrl - f                           fill (maximize)
#   fn + ctrl - c                           center
#
# Windows Snap  (the Win key ≈ cmd on a Mac keyboard):
#   cmd - left / right                      snap left / right half
#   cmd - up                                maximize
#   cmd - down                              minimize / restore
#   cmd + shift - left / right              move to other monitor
#
# Linux (GNOME / KDE; the Super key ≈ cmd):
#   cmd - left / right                      tile left / right half
#   cmd - up                                maximize
#   (KDE quarters: Super + diagonal arrows)


# ════════════════════════════════════════════════════════════════════════════
#  EXTRA ACTIONS — ready to use (call yabai directly; no script change needed).
#  Remove the leading "#" on a line to enable it.
# ════════════════════════════════════════════════════════════════════════════
#
# Top / bottom half:
# alt + cmd - up    : yabai -m window --grid 2:1:0:0:1:1
# alt + cmd - down  : yabai -m window --grid 2:1:0:1:1:1
#
# Quarters (top-left, top-right, bottom-left, bottom-right):
# ctrl + alt - u : yabai -m window --grid 2:2:0:0:1:1
# ctrl + alt - i : yabai -m window --grid 2:2:1:0:1:1
# ctrl + alt - j : yabai -m window --grid 2:2:0:1:1:1
# ctrl + alt - k : yabai -m window --grid 2:2:1:1:1:1
#
# Center (a centred, smaller floating size):
# alt + cmd - c : yabai -m window --grid 6:6:1:1:4:4
#
# Move the focused window to the next / previous display:
# ctrl + alt + cmd - right : yabai -m window --display next 2>/dev/null || yabai -m window --display first
# ctrl + alt + cmd - left  : yabai -m window --display prev 2>/dev/null || yabai -m window --display last
#
# Move keyboard FOCUS between displays (1/2/3):
# ctrl + alt - 1 : yabai -m display --focus 1
# ctrl + alt - 2 : yabai -m display --focus 2
# ctrl + alt - 3 : yabai -m display --focus 3


# ────────────────────────────────────────────────────────────────────────────
#  NOTES
#  • ⌥⌘ ←/→ also switch browser TABS in many apps; skhd intercepts them
#    globally. If you rely on tab-switching, comment out the alt+cmd left/right
#    lines above and use the ⌃⌥ set instead.
#  • cmd + arrow (the Windows/Linux style) collides with lots of macOS app
#    shortcuts (back, start/end of line) — listed for reference, not advised.
#  • You can bind several key combos to one action (as done above).
#  • After changing this file:  skhd --restart-service
# ────────────────────────────────────────────────────────────────────────────
